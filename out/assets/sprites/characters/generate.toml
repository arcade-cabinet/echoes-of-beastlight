# Character Sprite Generation Prompt
[prompt]
type = "sprite_sheet"
target = "hero_sprites"

[context]
# Pull from our Rust config
config_path = "src/config/style.rs"
palette_source = "ColorPalette"
sprite_config = "SpriteConfig"

[requirements]
character = "Luna"
class = "Lightkeeper"
size = "32x32"
animations = [
    { name = "idle", frames = 2, direction = "south" },
    { name = "walk", frames = 4, directions = ["north", "south", "east", "west"] },
    { name = "attack", frames = 3, directions = ["north", "south", "east", "west"] },
    { name = "cast", frames = 4, direction = "south" },
    { name = "hurt", frames = 2, direction = "south" },
]

[style]
description = """
Create pixel art sprites for Luna, the Lightkeeper hero. She should have:
- Flowing white/silver hair with light blue highlights
- A hooded cloak that glows faintly at the edges
- Simple traveling clothes underneath in muted earth tones
- A staff or wand that emanates soft light
- Determined but kind expression

The sprite should use the corruption-resistant color palette with emphasis on:
- Primary bright (#ffffff) for light effects
- Primary light (#6a6a8e) for clothing
- Magic pure (#64b5f6) for magical elements
- Small touches of corruption glow (#903749) showing the world's influence

All sprites must have clean 1px black outlines and follow the 32x32 grid.
"""

[output]
format = "png"
layout = "grid"
background = "transparent"
filename = "luna_sprites.png"