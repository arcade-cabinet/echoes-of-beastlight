audio:
  - category: ambient
    style: SNES orchestra
    mood: atmospheric
    environments:
      - name: Verdant Flats
        layers:
          - type: square wave
            pitch: low
            volume: medium
            filter: reverb
            loop: true
            loop_duration: 120s
            crossfade: 2s
          - type: noise channel
            pitch: high
            volume: low
            filter: echo
            loop: true
            loop_duration: 60s
            crossfade: 1s
        environmental_effects:
          - reverb: medium
          - echo: low
      - name: Glintrock Expanse
        layers:
          - type: triangle wave
            pitch: medium
            volume: high
            filter: reverb
            loop: true
            loop_duration: 90s
            crossfade: 2s
          - type: noise channel
            pitch: low
            volume: medium
            filter: echo
            loop: true
            loop_duration: 120s
            crossfade: 1s
        environmental_effects:
          - reverb: high
          - echo: medium
      - name: Cratervine Chasm
        layers:
          - type: square wave
            pitch: high
            volume: low
            filter: reverb
            loop: true
            loop_duration: 180s
            crossfade: 2s
          - type: noise channel
            pitch: medium
            volume: high
            filter: echo
            loop: true
            loop_duration: 60s
            crossfade: 1s
        environmental_effects:
          - reverb: low
          - echo: high
