description: >
  Echoes of Beastlight is a cross-platform top-down JRPG using SDL2 and CMake. It features procedurally generated maps,
  monster taming vs XP tradeoffs, dungeon boss progression, and palette-swapped sprites. Code must work on Linux,
  macOS, and Windows and be cross-compiled via GitHub Actions.

scope: repository

features:
  - name: Tile Renderer
    summary: Render 16x16 pixel tiles using SDL2. Optimize draw calls with sprite sheets and support palette swaps.
  - name: Map Generator
    summary: Generate 12x12 grid maps with passable paths using DAG logic. Place terrain, dungeons, and shops procedurally.
  - name: Dungeon Maze Generator
    summary: Generate maze-like dungeons with at least 3 false paths and 1 guaranteed boss room.
  - name: Quest Engine
    summary: Load and evaluate quests from YAML. Provide goals, hints, and obstacles with conditions.
  - name: Tame System
    summary: Combat mechanic that lets players tame monsters or earn XP. Scales difficulty and encounter odds.
  - name: CMake + SDL2
    summary: Cross-platform build system using CMake. Link SDL2, SDL2_mixer. Set up for GitHub Actions CI/CD.

recommenders:
  - file: src/map_generator.cpp
    prompt: Generate a 12x12 tilemap with guaranteed traversal path, random enemy placements, and a 20% chance of a dungeon entrance.
  - file: src/quest_engine.cpp
    prompt: Load quests from quests.yaml and assign based on current player progress. Include dialog and reward structure.
  - file: src/audio_loader.cpp
    prompt: Load looping OGG files from /assets/audio using SDL2_mixer and trigger them during scene transitions.
