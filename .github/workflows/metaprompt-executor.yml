name: Execute Vintage Game Metaprompt

on:
  workflow_dispatch:
  push:
    paths:
      - 'game-config.yaml'

jobs:
  execute-metaprompt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq
          
          # Install custom action dependencies
          cd .github/actions/openai-game-gen
          npm ci
          npm run build
          cd $GITHUB_WORKSPACE
          
          # Install build tools dependencies
          cd tools
          npm ci
          cd $GITHUB_WORKSPACE
          
      - name: Read config into environment
        run: |
          # Parse YAML config into environment variables
          echo "GAME_TITLE=$(yq e '.game.title' game-config.yaml)" >> $GITHUB_ENV
          echo "GAME_THEME=$(yq e '.theme.setting' game-config.yaml)" >> $GITHUB_ENV
          echo "PLATFORM=$(yq e '.platform.target' game-config.yaml)" >> $GITHUB_ENV
          echo "ART_STYLE=$(yq e '.graphics.art_style' game-config.yaml)" >> $GITHUB_ENV
          echo "HERO_NAME=$(yq e '.hero.name' game-config.yaml)" >> $GITHUB_ENV
          echo "HERO_DESC=$(yq e '.hero.description' game-config.yaml)" >> $GITHUB_ENV
          
      - name: Execute Complete Metaprompt
        id: metaprompt
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: docs/metaprompt_output.md
          generation_type: code
          model: gpt-4
          temperature: 0.8
          max_tokens: 4000
          system_prompt: |
            You are a vintage game generator inspired by 1980-1995 games. 
            Generate all components for a complete game based on the provided configuration. 
            Output everything in a structured format that can be parsed.
          user_prompt: |
            Generate a complete vintage-style game based on this configuration:
            
            Game Title: ${{ env.GAME_TITLE }}
            Theme: ${{ env.GAME_THEME }}
            Platform: Cross-platform including web (using Rust + Bevy)
            Art Style: Final Fantasy VI meets Pokemon GSC
            Hero: ${{ env.HERO_NAME }} - ${{ env.HERO_DESC }}
            
            Generate:
            1. DALL-E prompts for all sprites and tiles
            2. Audio specifications
            3. Quest/dialog/map structures
            4. Complete Rust + Bevy code structure
            
            Format the output with clear section headers marked with ### for parsing.
            
      - name: Parse metaprompt output
        run: |
          # Save the complete output
          cat docs/metaprompt_output.md
          
          # Extract sections using awk
          mkdir -p assets/prompts assets/audio data docs
          awk '/### DALL-E PROMPTS/,/### AUDIO/' docs/metaprompt_output.md > assets/prompts/dalle_prompts.txt
          awk '/### AUDIO/,/### QUESTS/' docs/metaprompt_output.md > assets/audio/audio_specs.txt
          awk '/### QUESTS/,/### CODE/' docs/metaprompt_output.md > data/quests_raw.txt
          awk '/### CODE/,/### END/' docs/metaprompt_output.md > docs/code_structure.txt
          
      - name: Generate Cargo.toml
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: Cargo.toml
          generation_type: code
          temperature: 0.2
          system_prompt: |
            You are a Rust expert creating a Bevy game project.
            Focus on cross-platform compatibility including WASM.
            Use the dependencies from the game config.
          user_prompt: |
            Generate Cargo.toml for Echoes of Beastlight with these dependencies:
            {config.build.dependencies}
            
            Include:
            - Workspace setup if needed
            - Proper feature flags for WASM
            - Optimization profiles
            - All crates specified in config
            
      - name: Generate main.rs
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: src/main.rs
          generation_type: code
          temperature: 0.3
          user_prompt: |
            Generate main.rs for Echoes of Beastlight with:
            - Bevy app setup with DefaultPlugins
            - Custom plugins: TilemapPlugin, YoleckPlugin, MonsterPlugin
            - State machine for GameState (Menu, Overworld, Battle, Shop)
            - Window configuration for pixel-perfect rendering
            - WASM compatibility checks
            - Integration with bevy_ecs_tilemap and bevy-yoleck
            
      - name: Trigger tilemap generation
        uses: ./.github/workflows/generate-tilemaps.yml
        with:
          zones: '["all"]'
          
      - name: Trigger level generation
        uses: ./.github/workflows/generate-levels.yml
        with:
          level_types: '["overworld", "dungeon", "cave", "boss"]'
          count_per_type: 5
          
      - name: Generate monster database
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: assets/data/monsters.yaml
          generation_type: monster
          parse_format: yaml
          temperature: 0.8
          user_prompt: |
            {
              "count": 25,
              "nouns": "{config.generation_rules.nouns}",
              "verbs": "{config.generation_rules.verbs}",
              "adjectives": "{config.generation_rules.adjectives}",
              "level_range": "1-50"
            }
            
      - name: Generate component definitions
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: src/components.rs
          generation_type: code
          temperature: 0.3
          user_prompt: |
            Generate all Bevy component definitions for Echoes of Beastlight:
            - Position (for grid-based movement)
            - Player, Monster, NPC markers
            - Stats (HP, ATK, DEF, SPD, Level, XP)
            - TileMap integration components
            - Yoleck-compatible components
            - Use bevy::prelude::*
            - Derive appropriate traits
            
      - name: Generate build scripts
        run: |
          # Create web build script
          cat > build-web.sh << 'EOF'
          #!/bin/bash
          # Build for WASM
          echo "🎮 Building Echoes of Beastlight for Web..."
          
          # Add WASM target if not present
          rustup target add wasm32-unknown-unknown
          
          # Install wasm-bindgen if not present
          command -v wasm-bindgen-cli >/dev/null 2>&1 || cargo install wasm-bindgen-cli
          
          # Build
          cargo build --release --target wasm32-unknown-unknown
          
          # Generate bindings
          wasm-bindgen --out-dir ./out/ --target web ./target/wasm32-unknown-unknown/release/beastlight.wasm
          
          echo "✅ Build complete! Serve index.html to play."
          EOF
          chmod +x build-web.sh
          
      - name: Generate index.html
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: index.html
          generation_type: code
          temperature: 0.3
          system_prompt: |
            Create a retro-styled web page for hosting a Bevy WASM game.
          user_prompt: |
            Generate index.html for Echoes of Beastlight:
            - Retro pixel font styling
            - Canvas with integer scaling
            - Loading animation while WASM loads
            - Keyboard controls display
            - Dark theme matching the game
            - Mobile-friendly viewport
            - Include bevy_webgl2 initialization
            
      - name: Generate README
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: README.md
          generation_type: code
          temperature: 0.5
          system_prompt: |
            Create comprehensive game documentation with ASCII art.
          user_prompt: |
            Generate README.md for ${{ env.GAME_TITLE }} with:
            - Epic ASCII art logo
            - Game description from config
            - Features list
            - Build instructions (native + web)
            - How to use the metaprompt system
            - Controls guide
            - Link to play online
            - Credits to tools used (Bevy, bevy_ecs_tilemap, bevy-yoleck, mapgen)
            - 90s-style formatting
            
      - name: Run build tool validation
        run: |
          cd tools
          node build.js --help
          cd $GITHUB_WORKSPACE
          
      - name: Commit all generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "🎮 Generated Echoes of Beastlight (Rust + Bevy + Advanced Crates)" || echo "No changes"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}