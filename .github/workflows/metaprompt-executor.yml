name: Execute Vintage Game Metaprompt

on:
  workflow_dispatch:
  push:
    paths:
      - 'game-config.yaml'

jobs:
  execute-metaprompt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq
          
      - name: Read config into environment
        run: |
          # Parse YAML config into environment variables
          echo "GAME_TITLE=$(yq e '.game.title' game-config.yaml)" >> $GITHUB_ENV
          echo "GAME_THEME=$(yq e '.theme.setting' game-config.yaml)" >> $GITHUB_ENV
          echo "PLATFORM=$(yq e '.platform.target' game-config.yaml)" >> $GITHUB_ENV
          echo "ART_STYLE=$(yq e '.graphics.art_style' game-config.yaml)" >> $GITHUB_ENV
          echo "HERO_NAME=$(yq e '.hero.name' game-config.yaml)" >> $GITHUB_ENV
          echo "HERO_DESC=$(yq e '.hero.description' game-config.yaml)" >> $GITHUB_ENV
          
      - name: Execute Complete Metaprompt
        id: metaprompt
        uses: Just-Moh-it/openai@v0.0.1
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          model: "gpt-4"
          temperature: 0.8
          max_tokens: 4000
          messages: |
            [
              {
                "role": "system",
                "content": "You are a vintage game generator inspired by 1980-1995 games. Generate all components for a complete game based on the provided configuration. Output everything in a structured format that can be parsed."
              },
              {
                "role": "user",
                "content": "Generate a complete vintage-style game based on this configuration:\n\nGame Title: ${{ env.GAME_TITLE }}\nTheme: ${{ env.GAME_THEME }}\nPlatform: Cross-platform including web (using Rust + Bevy)\nArt Style: Final Fantasy VI meets Pokemon GSC\nHero: ${{ env.HERO_NAME }} - ${{ env.HERO_DESC }}\n\nGenerate:\n1. DALL-E prompts for all sprites and tiles\n2. Audio specifications\n3. Quest/dialog/map structures\n4. Complete Rust + Bevy code structure\n\nFormat the output with clear section headers marked with ### for parsing."
              }
            ]
            
      - name: Parse metaprompt output
        run: |
          # Save the complete output
          echo '${{ steps.metaprompt.outputs.content }}' > metaprompt_output.txt
          
          # Extract sections using awk
          awk '/### DALL-E PROMPTS/,/### AUDIO/' metaprompt_output.txt > dalle_section.txt
          awk '/### AUDIO/,/### QUESTS/' metaprompt_output.txt > audio_section.txt
          awk '/### QUESTS/,/### CODE/' metaprompt_output.txt > quests_section.txt
          awk '/### CODE/,/### END/' metaprompt_output.txt > code_section.txt
          
      - name: Generate DALL-E prompts file
        run: |
          mkdir -p assets/prompts
          cat dalle_section.txt > assets/prompts/dalle_prompts.txt
          
      - name: Generate audio specs
        run: |
          mkdir -p assets/audio
          cat audio_section.txt > assets/audio/audio_specs.txt
          
      - name: Generate quest data
        run: |
          mkdir -p data
          cat quests_section.txt > data/quests_raw.txt
          
      - name: Generate code structure plan
        run: |
          mkdir -p docs
          cat code_section.txt > docs/code_structure.txt
          
      - name: Generate specific game files
        run: |
          # Create directory structure
          mkdir -p src src/systems src/components src/resources assets/sprites assets/audio assets/maps
          
      - name: Generate Cargo.toml
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: Cargo.toml
          temperature: 0.2
          systemPrompt: |
            You are a Rust expert creating a Bevy game project.
            Focus on cross-platform compatibility including WASM.
          userPrompt: |
            Generate Cargo.toml for Echoes of Beastlight with:
            - Bevy 0.12 with minimal features for smaller WASM builds
            - bevy_egui for UI
            - serde for data serialization
            - rand for procedural generation
            - Target both native and wasm32-unknown-unknown
            - Optimize for size in release mode
            
      - name: Generate main.rs
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/main.rs
          temperature: 0.3
          systemPrompt: |
            You are a Rust game developer using Bevy ECS. Write idiomatic Rust code.
            Comment like a 90s programmer but with Rust safety in mind.
          userPrompt: |
            Generate main.rs for Echoes of Beastlight with:
            - Bevy app setup with DefaultPlugins
            - Custom GamePlugin that adds all game systems
            - State machine for GameState (Menu, Overworld, Battle, Shop)
            - Window configuration for pixel-perfect rendering
            - WASM compatibility checks
            - Resource loading system
            
      - name: Generate map_system.rs
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/systems/map_system.rs
          temperature: 0.4
          systemPrompt: |
            You are an expert in procedural generation with Bevy ECS.
            Create efficient, deterministic map generation using Bevy's entity-component system.
          userPrompt: |
            Generate a map system for Echoes of Beastlight:
            - 12x12 tile maps as entities with TileMap component
            - DAG algorithm for guaranteed traversal
            - Spawn tile entities with Sprite components
            - Handle tile recoloring via sprite tint
            - Dungeon/shop placement logic
            - Map transition system between screens
            - Use Bevy's Transform for positioning
            
      - name: Generate monster_system.rs
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/systems/monster_system.rs
          temperature: 0.4
          systemPrompt: |
            Create a Pokemon/FF hybrid monster system using Bevy ECS patterns.
          userPrompt: |
            Generate monster system with:
            - Monster component with stats (HP, ATK, DEF, SPD)
            - TameableMonster and PlayerMonster marker components
            - Battle system using Bevy events
            - Taming mechanics (check HP threshold)
            - Party resource (Vec<Entity>)
            - XP/leveling with logarithmic scaling
            - Ability system using enums
            
      - name: Generate components.rs
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/components.rs
          temperature: 0.3
          systemPrompt: |
            Define all Bevy components for the game following ECS best practices.
          userPrompt: |
            Generate all component definitions:
            - Player, Monster, NPC components
            - Tile, TileMap components
            - Stats, Abilities components
            - Item, Shop components
            - Position component for grid-based movement
            - Use derive macros appropriately
            - Keep components small and focused
            
      - name: Generate resources.rs
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/resources.rs
          temperature: 0.3
          systemPrompt: |
            Define Bevy resources for game state and configuration.
          userPrompt: |
            Generate resource definitions:
            - GameConfig resource (loaded from YAML)
            - MapGenerationRules resource
            - MonsterDatabase resource
            - PlayerProgress resource (level, gold, dungeons cleared)
            - RNG resource for deterministic generation
            
      - name: Generate build scripts
        run: |
          # Create web build script
          cat > build-web.sh << 'EOF'
          #!/bin/bash
          # Build for WASM
          cargo build --release --target wasm32-unknown-unknown
          wasm-bindgen --out-dir ./out/ --target web ./target/wasm32-unknown-unknown/release/beastlight.wasm
          EOF
          chmod +x build-web.sh
          
          # Create index.html for web version
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>Echoes of Beastlight</title>
              <style>
                  body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; }
                  canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
              </style>
          </head>
          <body>
              <script type="module">
                  import init from './out/beastlight.js';
                  init();
              </script>
          </body>
          </html>
          EOF
          
      - name: Generate README with build instructions
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: README.md
          temperature: 0.5
          systemPrompt: |
            Create retro-style game documentation with ASCII art.
            Include specific Rust/Bevy build instructions.
          userPrompt: |
            Generate README.md for Echoes of Beastlight with:
            - ASCII art logo
            - Game description
            - Build instructions for:
              - Native: cargo run --release
              - Web: ./build-web.sh then serve index.html
            - Required tools: rust, wasm-pack, wasm-bindgen
            - Controls guide
            - Link to play online version
            - 90s-style formatting
            
      - name: Commit all generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "🎮 Generated Echoes of Beastlight (Rust + Bevy version)" || echo "No changes"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}