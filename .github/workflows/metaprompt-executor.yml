name: Execute Vintage Game Metaprompt

on:
  workflow_dispatch:
  push:
    paths:
      - 'game-config.yaml'

jobs:
  execute-metaprompt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq
          
      - name: Read config into environment
        run: |
          # Parse YAML config into environment variables
          echo "GAME_TITLE=$(yq e '.game.title' game-config.yaml)" >> $GITHUB_ENV
          echo "GAME_THEME=$(yq e '.theme.setting' game-config.yaml)" >> $GITHUB_ENV
          echo "PLATFORM=$(yq e '.platform.target' game-config.yaml)" >> $GITHUB_ENV
          echo "ART_STYLE=$(yq e '.graphics.art_style' game-config.yaml)" >> $GITHUB_ENV
          echo "HERO_NAME=$(yq e '.hero.name' game-config.yaml)" >> $GITHUB_ENV
          echo "HERO_DESC=$(yq e '.hero.description' game-config.yaml)" >> $GITHUB_ENV
          
      - name: Execute Complete Metaprompt
        id: metaprompt
        uses: Just-Moh-it/openai@v0.0.1
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          model: "gpt-4"
          temperature: 0.8
          max_tokens: 4000
          messages: |
            [
              {
                "role": "system",
                "content": "You are a vintage game generator inspired by 1980-1995 games. Generate all components for a complete game based on the provided configuration. Output everything in a structured format that can be parsed."
              },
              {
                "role": "user",
                "content": "Generate a complete vintage-style game based on this configuration:\n\nGame Title: ${{ env.GAME_TITLE }}\nTheme: ${{ env.GAME_THEME }}\nPlatform: Cross-platform desktop (Windows/Linux/macOS)\nArt Style: Final Fantasy VI meets Pokemon GSC\nHero: ${{ env.HERO_NAME }} - ${{ env.HERO_DESC }}\n\nGenerate:\n1. DALL-E prompts for all sprites and tiles\n2. Audio specifications\n3. Quest/dialog/map structures\n4. Complete C++ code structure\n\nFormat the output with clear section headers marked with ### for parsing."
              }
            ]
            
      - name: Parse metaprompt output
        run: |
          # Save the complete output
          echo '${{ steps.metaprompt.outputs.content }}' > metaprompt_output.txt
          
          # Extract sections using awk
          awk '/### DALL-E PROMPTS/,/### AUDIO/' metaprompt_output.txt > dalle_section.txt
          awk '/### AUDIO/,/### QUESTS/' metaprompt_output.txt > audio_section.txt
          awk '/### QUESTS/,/### CODE/' metaprompt_output.txt > quests_section.txt
          awk '/### CODE/,/### END/' metaprompt_output.txt > code_section.txt
          
      - name: Generate DALL-E prompts file
        run: |
          mkdir -p assets/prompts
          cat dalle_section.txt > assets/prompts/dalle_prompts.txt
          
      - name: Generate audio specs
        run: |
          mkdir -p assets/audio
          cat audio_section.txt > assets/audio/audio_specs.txt
          
      - name: Generate quest data
        run: |
          mkdir -p data
          cat quests_section.txt > data/quests_raw.txt
          
      - name: Generate code structure plan
        run: |
          mkdir -p docs
          cat code_section.txt > docs/code_structure.txt
          
      - name: Generate specific game files
        run: |
          # Create directory structure
          mkdir -p src data assets/sprites assets/audio assets/maps
          
      - name: Generate main.cpp
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/main.cpp
          temperature: 0.3
          systemPrompt: |
            You are a C++ game developer. Write memory-efficient code for cross-platform SDL2 games.
            Comment like a 90s programmer: terse, hacky, effective.
          userPrompt: |
            Generate the main.cpp for Echoes of Beastlight with:
            - SDL2 init for Windows/Linux/macOS
            - 60Hz game loop
            - State machine (overworld, battle, menu, shop)
            - Input handling (arrows + A/B buttons)
            - 16x16 tile renderer
            - Basic audio stub
            
            Make it compile and run immediately.
            
      - name: Generate map_generator.cpp
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/map_generator.cpp
          temperature: 0.4
          systemPrompt: |
            You are an expert in procedural generation. Create efficient map generation algorithms.
          userPrompt: |
            Generate a map generator for Echoes of Beastlight:
            - 12x12 grids with symbols: W (wall), . (walkable), D (dungeon), S (shop), E (enemy)
            - DAG algorithm ensuring traversal between any two edges
            - Ocean/mountain blockers that preserve paths
            - Dungeon every 5 maps (guaranteed)
            - Shop 20-40% chance
            - Tile recoloring for variety
            - Maze dungeons with 3+ dead ends
            
      - name: Generate monster_system.cpp
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/monster_system.cpp
          temperature: 0.4
          systemPrompt: |
            Create a Pokemon/FF hybrid monster system with taming mechanics.
          userPrompt: |
            Generate monster system code:
            - Struct for monsters (HP, ATK, DEF, SPD, abilities)
            - Tame vs slay choice mechanics
            - Turn-based battle system
            - Logarithmic XP scaling
            - Party size: 0 start, +1 per dungeon
            - Procedural abilities from: [bite, slash, guard, dash, volley, drain]
            - Boss scaling based on area progression
            
      - name: Generate monsters.yaml
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: data/monsters.yaml
          temperature: 0.8
          systemPrompt: |
            Create unique monsters by combining word elements creatively.
          userPrompt: |
            Generate 25 monsters combining:
            Nouns: crystal, beast, shadow, thorn, mist, ember, root, glyph
            Verbs: slash, bite, guard, dash, volley, drain, shimmer, howl  
            Adjectives: arcane, wild, ancient, corrupted, mystical, feral, glowing
            
            Format:
            - id: unique_name
              name: "Display Name"
              stats: {hp: X, atk: X, def: X, spd: X}
              abilities: [ability1, ability2]
              xp_reward: X
              tame_difficulty: X
              
      - name: Generate CMakeLists.txt
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: CMakeLists.txt
          temperature: 0.2
          systemPrompt: |
            Create a cross-platform CMake build system.
          userPrompt: |
            Generate CMakeLists.txt for Echoes of Beastlight:
            - Support Windows, Linux, macOS
            - Find and link SDL2, SDL2_image, SDL2_mixer
            - C++17 standard
            - Copy assets to build directory
            - Set up install targets
            
      - name: Generate README with ASCII art
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: README.md
          temperature: 0.5
          systemPrompt: |
            Create retro-style game documentation with ASCII art.
          userPrompt: |
            Generate README.md for Echoes of Beastlight with:
            - ASCII art logo
            - Game description
            - Features list
            - Build instructions for all platforms
            - Controls guide
            - Gameplay tips
            - 90s-style formatting
            
      - name: Commit all generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "🎮 Generated Echoes of Beastlight game files" || echo "No changes"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}