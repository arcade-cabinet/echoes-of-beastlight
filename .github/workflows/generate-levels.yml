name: Generate Level Configurations

on:
  workflow_call:
    inputs:
      level_types:
        description: 'JSON array of level types to generate'
        required: false
        type: string
        default: '["overworld", "dungeon", "cave", "boss"]'
      count_per_type:
        description: 'Number of variations per level type'
        required: false
        type: number
        default: 5
  workflow_dispatch:
    inputs:
      level_types:
        description: 'Comma-separated level types or JSON array'
        required: false
        default: 'overworld,dungeon,cave,boss'
      count_per_type:
        description: 'Number of variations per level type'
        required: false
        default: '5'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      level_types: ${{ steps.parse.outputs.level_types }}
      count: ${{ steps.parse.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Parse inputs
        id: parse
        run: |
          # Parse level types
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TYPES="${{ github.event.inputs.level_types }}"
            COUNT="${{ github.event.inputs.count_per_type }}"
          else
            TYPES="${{ inputs.level_types }}"
            COUNT="${{ inputs.count_per_type }}"
          fi
          
          if [[ "$TYPES" != \[* ]]; then
            # Convert comma-separated to JSON array
            TYPES=$(echo "$TYPES" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$";""))')
          fi
          
          echo "level_types=$TYPES" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Generating $COUNT variations for each type: $TYPES"

  generate-mapgen-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Build custom action
        run: |
          cd .github/actions/openai-game-gen
          npm ci
          npm run build
          
      - name: Generate mapgen wrapper
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: src/generation/mapgen_wrapper.rs
          generation_type: code
          temperature: 0.3
          system_prompt: |
            Create a wrapper around mapgen.rs that integrates with Bevy and our game systems.
            Use the algorithms specified in the config for different level types.
          user_prompt: |
            Generate a mapgen wrapper module that:
            - Wraps mapgen::Map for use with Bevy
            - Implements these algorithms from config:
              - Overworld: {config.environments.map_generation.mapgen_algorithms.overworld}
              - Dungeon: {config.environments.map_generation.mapgen_algorithms.dungeon}
              - Cave: {config.environments.map_generation.mapgen_algorithms.cave}
              - Maze: {config.environments.map_generation.mapgen_algorithms.maze}
            - Converts mapgen output to bevy_ecs_tilemap format
            - Adds entity spawn points based on map features
            - Ensures traversability constraints from config
            
      - name: Commit mapgen wrapper
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "🗺️ Generated mapgen wrapper"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

  generate-levels:
    needs: [prepare, generate-mapgen-integration]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        level_type: ${{ fromJson(needs.prepare.outputs.level_types) }}
        variation: ${{ fromJson('[1,2,3,4,5]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
          
      - name: Generate level ${{ matrix.level_type }}_${{ matrix.variation }}
        if: ${{ matrix.variation <= fromJson(needs.prepare.outputs.count) }}
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: assets/levels/${{ matrix.level_type }}_${{ matrix.variation }}.yol
          generation_type: level
          parse_format: yaml
          temperature: 0.7
          user_prompt: |
            {
              "algorithm": "{config.environments.map_generation.mapgen_algorithms.${{ matrix.level_type }}}",
              "width": 50,
              "height": 50,
              "features": ["spawn_points", "exits", "treasures", "enemies"],
              "level_type": "${{ matrix.level_type }}",
              "variation": ${{ matrix.variation }}
            }
            
      - name: Generate level metadata
        if: ${{ matrix.variation <= fromJson(needs.prepare.outputs.count) }}
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: assets/levels/${{ matrix.level_type }}_${{ matrix.variation }}_meta.yaml
          generation_type: level
          parse_format: yaml
          temperature: 0.5
          system_prompt: |
            Generate metadata for the level including difficulty, rewards, and special features.
          user_prompt: |
            Generate metadata for ${{ matrix.level_type }} level variation ${{ matrix.variation }}:
            - Difficulty scaling based on progression
            - Monster spawn tables
            - Loot tables
            - Environmental hazards
            - Special room types (shop, save, boss)
            - Music/ambiance triggers
            
      - name: Generate yoleck entity definitions
        if: ${{ matrix.variation <= fromJson(needs.prepare.outputs.count) }}
        run: |
          # Create yoleck entity file
          cat > assets/levels/${{ matrix.level_type }}_${{ matrix.variation }}_entities.yol << 'EOF'
          # Generated Yoleck entities for ${{ matrix.level_type }}_${{ matrix.variation }}
          
          - type: PlayerSpawn
            position: {x: 0, y: 0}
            components:
              - Position
              - Player
              - Camera2d
          
          - type: MapTransition
            position: {x: 0, y: 0}
            components:
              - Position
              - Transition:
                  target: "next_level"
                  direction: "north"
          
          - type: MonsterSpawn
            position: {x: 10, y: 10}
            components:
              - Position
              - MonsterSpawner:
                  pool: "${{ matrix.level_type }}_monsters"
                  difficulty: ${{ matrix.variation }}
          EOF
          
      - name: Validate level files
        if: ${{ matrix.variation <= fromJson(needs.prepare.outputs.count) }}
        run: |
          # Basic YAML validation
          for file in assets/levels/${{ matrix.level_type }}_${{ matrix.variation }}*.y*l; do
            if [ -f "$file" ]; then
              echo "Validating $file"
              python3 -c "import yaml; yaml.safe_load(open('$file'))" || echo "Warning: $file may have issues"
            fi
          done
          
      - name: Commit level files
        if: ${{ matrix.variation <= fromJson(needs.prepare.outputs.count) }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/levels/
          git diff --staged --quiet || git commit -m "🏔️ Generated level: ${{ matrix.level_type }}_${{ matrix.variation }}"
          
      - name: Push changes
        if: ${{ matrix.variation <= fromJson(needs.prepare.outputs.count) }}
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

  generate-level-systems:
    needs: generate-levels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
          
      - name: Generate yoleck integration
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: src/plugins/yoleck_plugin.rs
          generation_type: code
          temperature: 0.3
          system_prompt: |
            Create a Bevy plugin that integrates bevy-yoleck for level loading and editing.
            The plugin should work with our generated level files.
          user_prompt: |
            Generate a YoleckPlugin that:
            - Configures bevy-yoleck for our game
            - Loads .yol level files from assets/levels/
            - Registers all entity types used in levels
            - Handles level transitions
            - Integrates with mapgen-generated layouts
            - Supports both runtime and editor modes
            - Works with bevy_ecs_tilemap for rendering
            
      - name: Generate level loading system
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: src/systems/level_loader.rs
          generation_type: code
          temperature: 0.4
          user_prompt: |
            Create a level loading system that:
            - Loads levels based on progression
            - Handles level streaming/unloading
            - Manages entity persistence between levels
            - Integrates mapgen output with yoleck entities
            - Handles save/load state
            - Manages level-specific resources
            
      - name: Generate level progression system
        uses: ./.github/actions/openai-game-gen
        with:
          api_key: ${{ secrets.OPENAI_API_KEY }}
          output_path: src/systems/level_progression.rs
          generation_type: code
          temperature: 0.4
          user_prompt: |
            Generate a progression system that:
            - Tracks completed levels
            - Manages difficulty scaling
            - Handles the "every 5th map has dungeon" rule
            - Implements level selection logic
            - Manages boss encounters
            - Tracks player progress through zones
            
      - name: Commit level systems
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "⚙️ Generated level systems and yoleck integration"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}