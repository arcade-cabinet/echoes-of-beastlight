name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  # Determine what changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.changes.outputs.rust }}
      typescript: ${{ steps.changes.outputs.typescript }}
      workflows: ${{ steps.changes.outputs.workflows }}
      config: ${{ steps.changes.outputs.config }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            rust:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - 'clippy.toml'
            typescript:
              - '**/*.ts'
              - '**/*.js'
              - 'package*.json'
              - 'tsconfig*.json'
            workflows:
              - '.github/workflows/**'
            config:
              - 'game-config.yaml'
              - 'nx.json'
              - 'workspace.json'

  # Lint all code
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true
          
      - name: Cache Nx
        uses: actions/cache@v3
        with:
          path: node_modules/.cache/nx
          key: nx-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-
            
      - name: Install dependencies
        run: npm ci
        
      - name: Lint all projects
        run: npm run lint
        
      - name: Check formatting
        run: npm run format:check

  # Test all code
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache Nx
        uses: actions/cache@v3
        with:
          path: node_modules/.cache/nx
          key: nx-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-
            
      - name: Install dependencies
        run: npm ci
        
      - name: Run all tests
        run: npm test
        
      - name: Validate assets
        run: npm run validate

  # Build all projects
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [native, wasm]
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          
      - name: Add WASM target
        if: matrix.target == 'wasm'
        run: rustup target add wasm32-unknown-unknown
        
      - name: Install wasm-bindgen
        if: matrix.target == 'wasm'
        run: cargo install wasm-bindgen-cli
        
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache Nx
        uses: actions/cache@v3
        with:
          path: node_modules/.cache/nx
          key: nx-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-
            
      - name: Install dependencies
        run: npm ci
        
      - name: Build native
        if: matrix.target == 'native'
        run: npm run build
        
      - name: Build WASM
        if: matrix.target == 'wasm'
        run: npm run build:web
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ matrix.target }}
          path: |
            target/release/beastlight
            target/wasm32-unknown-unknown/release/*.wasm
            out/
            dist/

  # Security audit
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          
      - name: NPM audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
        
      - name: Cargo audit
        uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Dependency graph
  dep-graph:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate dependency graph
        run: npm run dep-graph -- --file=dep-graph.json
        
      - name: Upload dependency graph
        uses: actions/upload-artifact@v3
        with:
          name: dependency-graph
          path: dep-graph.json
          
      - name: Comment PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const depGraph = JSON.parse(fs.readFileSync('dep-graph.json', 'utf8'));
            const affected = depGraph.affectedProjects || [];
            
            const comment = `## 📊 Dependency Analysis
            
            **Affected Projects:** ${affected.length > 0 ? affected.join(', ') : 'None'}
            
            Run \`npm run dep-graph\` locally to visualize the full dependency graph.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });