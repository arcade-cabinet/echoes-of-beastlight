name: Bootstrap Beastlight Game

on:
  workflow_dispatch:
  push:
    paths:
      - 'game-config.yaml'
      - '.github/workflows/bootstrap-beastlight.yml'

jobs:
  # Read configuration
  read-config:
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.read.outputs.config }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Read game config
        id: read
        run: |
          CONFIG=$(cat game-config.yaml | jq -Rs .)
          echo "config=$CONFIG" >> $GITHUB_OUTPUT

  # Phase 1: Generate workflow generators
  generate-workflows:
    needs: read-config
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workflow:
          - name: "generate-assets"
            path: ".github/workflows/generate-assets.yml"
            prompt: "Create a workflow that generates game assets (sprites, maps, audio) based on config"
          - name: "generate-code"
            path: ".github/workflows/generate-code.yml"
            prompt: "Create a workflow that generates Rust + Bevy game code based on config"
          - name: "generate-data"
            path: ".github/workflows/generate-data.yml"
            prompt: "Create a workflow that generates game data files (quests, monsters, items) based on config"
          
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Generate ${{ matrix.workflow.name }} workflow
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: ${{ matrix.workflow.path }}
          temperature: 0.3
          systemPrompt: |
            You are an expert in GitHub Actions and game development workflows.
            The game config will be available as an input.
            Use the generate-file.yml workflow to create files.
            Always read from the config to get game-specific details.
          userPrompt: |
            ${{ matrix.workflow.prompt }}
            
            The workflow should:
            - Accept a 'config' input containing the game configuration
            - Parse the config to extract relevant sections
            - Use the generate-file.yml workflow to create appropriate files
            - Handle cross-platform requirements including WebAssembly
            - Include proper error handling and logging

  # Phase 2: Generate game assets
  generate-game-assets:
    needs: [read-config, generate-workflows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Generate DALL-E prompts
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: assets/prompts/dalle_prompts.txt
          temperature: 0.7
          systemPrompt: |
            You are an expert in creating DALL-E prompts for retro pixel art games.
            Focus on the Final Fantasy VI and Pokemon GSC aesthetic.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate DALL-E prompts for:
            1. Hero sprite sheet (Cael with crystal bracer)
            2. Monster sprites (Shadowbiter, Bramblehorn, Cryosprite)
            3. Tile sets for each environment zone
            4. UI elements (health bars, menus, dialog boxes)
            
            Each prompt should specify:
            - 16x16 pixel art style
            - Limited color palette
            - Multiple animation frames where needed
            - Palette swap variations

      - name: Generate audio descriptions
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: assets/audio/audio_specs.yaml
          temperature: 0.5
          systemPrompt: |
            You are an audio designer for retro-style games.
            Create specifications for game music and sound effects.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate detailed audio specifications in YAML format for:
            - Title screen music (mysterious + hopeful)
            - Overworld theme (ambient + curious)
            - Dungeon theme (tense + exploring)
            - Boss battle theme (tense + heroic)
            - Sound effects (jump, attack, tame, damage, menu, item)
            
            Include tempo, key, instruments, and loop points.

  # Phase 3: Generate game code (Rust + Bevy)
  generate-game-code:
    needs: [read-config, generate-workflows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Generate Cargo.toml
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: Cargo.toml
          temperature: 0.2
          systemPrompt: |
            You are a Rust expert configuring a Bevy game project.
            Focus on minimal dependencies for WASM compatibility.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate Cargo.toml for Echoes of Beastlight:
            - Bevy 0.12 with minimal features
            - Dependencies: bevy_egui, serde, serde_yaml, rand
            - Profile optimizations for WASM size
            - Both dev and release profiles configured
        
      - name: Generate main game module
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/main.rs
          temperature: 0.3
          systemPrompt: |
            You are a Rust game developer creating cross-platform Bevy games.
            Write idiomatic Rust with ECS patterns.
            Comment like a 90s programmer: terse but effective.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate the main.rs for Echoes of Beastlight:
            - Bevy app initialization
            - Plugin architecture (GamePlugin, RenderPlugin, AudioPlugin)
            - State management (Menu, Overworld, Battle, Shop, Dungeon)
            - Window setup for pixel-perfect rendering
            - WASM compatibility with conditional compilation
            - Asset loading system
            
            Make it compile and run immediately.

      - name: Generate map system
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/systems/map.rs
          temperature: 0.4
          systemPrompt: |
            You are an expert in procedural generation using Bevy ECS.
            Focus on creating efficient, deterministic map generation.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate a procedural map system with:
            - TileMap component storing 12x12 grid
            - Tile entities with Sprite components
            - DAG algorithm ensuring traversal
            - Ocean/mountain blockers preserving paths
            - Dungeon placement (guaranteed every 5 maps)
            - Shop placement (20-40% chance)
            - Tile recoloring via sprite tint
            - Map transition events
            - Maze algorithm for dungeons

      - name: Generate monster system
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/systems/monster.rs
          temperature: 0.4
          systemPrompt: |
            You are creating a Pokemon-inspired monster system in Bevy.
            Focus on the tame vs slay mechanics using ECS.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate a monster system with:
            - Monster component (HP, ATK, DEF, SPD, abilities)
            - Tameable and PlayerMonster marker components
            - Battle system using events and states
            - Taming mechanics (HP threshold check)
            - Party resource managing entities
            - XP/leveling with logarithmic scaling
            - Procedural ability assignment
            - Boss entity spawning and scaling

      - name: Generate component definitions
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: src/components.rs
          temperature: 0.3
          systemPrompt: |
            Define Bevy components following ECS best practices.
            Keep components small and focused on data.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate all component definitions:
            - Player, Monster, NPC, Boss markers
            - Position (grid coordinates)
            - Stats (HP, MaxHP, ATK, DEF, SPD, Level, XP)
            - Abilities (enum of all abilities)
            - Tile, TileType, TileMap
            - Item, Shop, ShopInventory
            - Sprite rendering components
            - Use appropriate derive macros

      - name: Generate web build configuration
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: .cargo/config.toml
          temperature: 0.2
          systemPrompt: |
            Configure Cargo for WASM builds.
          userPrompt: |
            Generate .cargo/config.toml for:
            - wasm32-unknown-unknown target
            - Optimization flags for size
            - Web-compatible linker settings

  # Phase 4: Generate game data
  generate-game-data:
    needs: [read-config, generate-workflows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Generate monster database
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: assets/data/monsters.yaml
          temperature: 0.8
          systemPrompt: |
            You are creating a monster database for a JRPG.
            Use the word lists to create unique combinations.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate 20+ unique monsters using combinations of:
            Nouns: crystal, beast, shadow, thorn, mist, ember, root, glyph
            Verbs: slash, bite, guard, dash, volley, drain, shimmer, howl
            Adjectives: arcane, wild, ancient, corrupted, mystical, feral, glowing
            
            Each monster should have:
            - Unique name combining words
            - Base stats (HP, ATK, DEF, SPD)
            - 1-2 abilities from verb list
            - Element/type
            - Tame difficulty
            - XP reward

      - name: Generate quest templates
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: assets/data/quest_templates.yaml
          temperature: 0.6
          systemPrompt: |
            You are designing procedural quest templates.
            Keep them simple but engaging.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate 10 quest templates that can be procedurally filled:
            - Taming quests (capture specific monster type)
            - Exploration quests (reach certain map count)
            - Combat quests (defeat X monsters)
            - Collection quests (gather X gold)
            - Boss quests (clear dungeon)
            
            Include NPC dialog templates with 90s quirky tone.

      - name: Generate item database
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: assets/data/items.yaml
          temperature: 0.5
          systemPrompt: |
            You are creating an item system for a retro JRPG.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate items including:
            - Potions (scaling with map level)
            - Weapons (various stat boosts)
            - Armor (defense boosts)
            - Special items (taming aids, escape items)
            
            Include costs, effects, and shop availability.

  # Phase 5: Generate build system and web files
  generate-build-system:
    needs: [read-config, generate-workflows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Generate web build script
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: build-web.sh
          temperature: 0.2
          systemPrompt: |
            You are creating build scripts for Rust WASM games.
          userPrompt: |
            Generate a build script that:
            - Installs wasm-bindgen-cli if needed
            - Builds for wasm32-unknown-unknown
            - Runs wasm-bindgen
            - Copies assets to web output
            - Generates index.html if missing
            - Includes local server instructions

      - name: Generate index.html
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: index.html
          temperature: 0.3
          systemPrompt: |
            Create a web page for hosting a Bevy WASM game.
          userPrompt: |
            Generate index.html for Echoes of Beastlight:
            - Retro-styled page with pixel font
            - Canvas centered with integer scaling
            - Loading screen while WASM initializes
            - Keyboard controls display
            - Mobile touch controls (optional)
            - Dark theme matching game aesthetic

      - name: Generate README
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: README.md
          temperature: 0.5
          systemPrompt: |
            You are writing documentation for a retro-style game project.
          userPrompt: |
            Based on this config: ${{ needs.read-config.outputs.config }}
            
            Generate a README.md that includes:
            - ASCII art title
            - Game description and features
            - Build instructions:
              - Native: cargo run --release
              - Web: ./build-web.sh
            - Deployment to GitHub Pages
            - How to play guide
            - Credits and acknowledgments
            - Link to play online

  # Phase 6: Generate metaprompt improvement workflow
  generate-self-improvement:
    needs: [read-config, generate-workflows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Generate config optimizer
        uses: ./.github/workflows/generate-file.yml
        with:
          outPath: .github/workflows/optimize-config.yml
          temperature: 0.6
          systemPrompt: |
            You are an AI system optimization expert.
            Create workflows that improve the game generation process.
          userPrompt: |
            Create a workflow that:
            - Analyzes the current game-config.yaml
            - Suggests improvements and additions
            - Tests generated Rust code compilation
            - Checks WASM build size
            - Proposes balance changes
            - Creates a new optimized config version
            
            This creates a self-improving loop.