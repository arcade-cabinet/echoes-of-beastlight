- Name: Emberclaw Beast
  Description: A Wild creature with a burning ferocity, the Emberclaw Beast is known for its flaming talons and fiery temperament.
  Type: Beast
  Base Stats:
    HP: 150
    Attack: 40
    Defense: 30
    Speed: 35
    Special: 10
  Abilities:
    - Name: Ember Swipe
      Type: Physical
      Power: 50
      Description: A burning claw attack that may leave the enemy with a burn.
    - Name: Wild Howl
      Type: Status
      Power: 0
      Description: The beast howls fiercely, increasing its Attack.
