name = "echoes-of-beastlight-cascade"
description = "Root meta-prompt cascade for Echoes of Beastlight game generation"
version = "1.0.0"
root_prompt = "root"

[global_variables]
game_name = "Echoes of Beastlight"
rust_edition = "2024"
bevy_version = "0.16.1"
target_platforms = ["windows", "mac", "linux", "web"]

# Foundation libraries
[global_variables.libraries]
ecs = "bevy"
tilemap = "bevy_ecs_tilemap"
level_editor = "bevy-yoleck"
physics = "bevy_rapier2d"
input = "leafwing-input-manager"
serialization = "ron"
random = "rand"
save_system = "bevy_save"
reactive_ui = "bevy_cobweb_ui"
reactive_core = "bevy_cobweb"
behavior_trees = "beet_flow"

# Project structure
[global_variables.project_structure]
assets_dir = "assets"
src_dir = "src"
components_module = "components"
systems_module = "systems"
tilemaps_module = "tilemaps"

[prompts.root]
id = "root"
output_type = { meta_prompt = {} }
variables = []
system_template = """
You are an AI game architect designing a comprehensive JRPG game called {{ game_name }}.
You are working with Rust {{ rust_edition }} and Bevy {{ bevy_version }}.

Your role is to generate meta-prompts that will cascade into a complete game implementation.
Each meta-prompt should be self-contained but aware of its place in the hierarchy.

Key architectural principles:
1. Use Entity Component System (ECS) design patterns
2. Ensure all code is idempotent and deterministic
3. Follow Rust best practices and idioms
4. Leverage Bevy's features effectively
5. Create reusable, modular components

Libraries available:
{% for lib, name in libraries.items() %}
- {{ lib }}: {{ name }}
{% endfor %}
"""

user_template = """
Generate two meta-prompt TOML files that will bootstrap the game generation:

1. `assets/metaprompt.toml` - For generating all game assets (sprites, audio, levels)
2. `src/metaprompt.toml` - For generating all game code (ECS components, systems, etc.)

Each meta-prompt should:
- Define its own cascade of child prompts
- Include proper inheritance relationships
- Set up idempotent generation with cache keys
- Use the same TOML format with embedded Jinja templates

The asset meta-prompt should generate prompts for:
- Sprite generation (characters, tiles, items)
- Audio specification generation
- Level design and layouts
- UI assets

The code meta-prompt should generate prompts for:
- ECS component definitions
- Game systems (movement, combat, inventory)
- World generation algorithms
- Monster taming mechanics
- Procedural content generation

Ensure both meta-prompts reference a shared style guide that will be generated separately.
"""

children = ["style_guide", "assets_metaprompt", "code_metaprompt"]
idempotent = true
cache_key_template = "root_{{ version }}"

[prompts.style_guide]
id = "style_guide"
output_type = { prompt = {} }
depends_on = ["root"]
variables = []
children = []
system_template = """
You are creating a comprehensive style guide for {{ game_name }}.
This style guide will ensure consistency across all generated content.

The game should have a cohesive aesthetic that blends:
- Classic JRPG pixel art style
- Modern visual effects and polish
- Consistent color palettes
- Unified design language
"""

user_template = """
Generate a style guide enforcement prompt (style_guide.toml) that will be used by all other prompts.

The style guide should define:

1. Visual Style:
   - Color palettes (primary, secondary, semantic)
   - Pixel art specifications (sprite sizes, outline styles)
   - Animation principles
   - UI/UX patterns

2. Audio Style:
   - Musical themes and motifs
   - Sound effect categories
   - Ambient soundscapes

3. Narrative Style:
   - Tone and mood
   - Character archetypes
   - World-building principles

4. Code Style:
   - Naming conventions
   - Module organization
   - Component patterns
   - System design patterns

The output should be a TOML file that can be loaded and used as context for all other generation prompts.
"""

idempotent = true
cache_key_template = "style_guide_v1"

[prompts.assets_metaprompt]
id = "assets_metaprompt"
output_type = { meta_prompt = {} }
depends_on = ["style_guide"]
inherits = "root"
variables = []
children = []
system_template = """
{{ super() }}

You are now specifically focused on asset generation for the game.
All assets must conform to the style guide defined in style_guide.toml.
"""

user_template = """
Create assets/metaprompt.toml that defines a cascade for generating all game assets.

The cascade should include prompts for:

1. Sprite Generation:
   - Character sprites (hero, NPCs, monsters)
   - Tile sprites (terrain, objects, decorations)
   - Item sprites (weapons, consumables, key items)
   - UI sprites (buttons, frames, icons)

2. Audio Specifications:
   - Background music tracks
   - Sound effects
   - Ambient sounds
   - Voice barks

3. Level Design:
   - Overworld maps
   - Dungeon layouts
   - Town layouts
   - Special areas

4. Data Files:
   - Monster definitions
   - Item databases
   - Quest specifications
   - Dialog trees

Each prompt should:
- Use structured output formats (JSON/YAML/RON)
- Include validation schemas
- Reference the style guide
- Be idempotent with proper cache keys
"""

idempotent = true
cache_key_template = "assets_meta_{{ version }}"

[prompts.code_metaprompt]
id = "code_metaprompt"
output_type = { meta_prompt = {} }
depends_on = ["style_guide"]
inherits = "root"
variables = []
children = []
system_template = """
{{ super() }}

You are now specifically focused on code generation for the game.
All code must follow Rust best practices and leverage Bevy's ECS architecture.
"""

user_template = """
Create src/metaprompt.toml that defines a cascade for generating all game code.

The cascade should include prompts for:

1. ECS Components:
   - Core components (Transform, Health, Stats)
   - Combat components (Damage, Defense, Skills)
   - Taming components (Tameable, Tamed, Bond)
   - Inventory components
   - World components (Tile, Chunk, Portal)

2. Game Systems:
   - Movement system
   - Combat system
   - Taming system
   - Inventory management
   - Save/Load system
   - World generation system

3. Procedural Generation:
   - Monster generation with mad libs
   - World layout generation (DAG-based)
   - Quest generation
   - Item generation

4. Integration:
   - Main game loop
   - State management
   - Resource management
   - Plugin organization

Each prompt should:
- Generate valid Rust code
- Use proper Bevy patterns
- Include comprehensive tests
- Be modular and reusable
"""

idempotent = true
cache_key_template = "code_meta_{{ version }}"