[config]
default_to_workspace = false
skip_core_tasks = true

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

# Default task shows help
[tasks.default]
alias = "help"

[tasks.help]
description = "Show available commands"
script = '''
echo "AI Game Generator - Development Commands"
echo ""
echo "Setup:"
echo "  cargo make install      - Install all development dependencies"
echo "  cargo make setup        - Complete development environment setup"
echo ""
echo "Quality Checks (using pre-commit):"
echo "  cargo make check        - Run all checks (format, lint, test, security)"
echo "  cargo make fix          - Auto-fix issues where possible"
echo "  cargo make format       - Check code formatting"
echo "  cargo make lint         - Run clippy linting"
echo "  cargo make test         - Run tests"
echo "  cargo make security     - Run security checks"
echo ""
echo "Development:"
echo "  cargo make build        - Build all binaries"
echo "  cargo make run          - Run the AI generator"
echo "  cargo make studio       - Run the Bevy studio"
echo "  cargo make docs         - Build and open documentation"
echo "  cargo make clean        - Clean build artifacts"
echo ""
echo "Release:"
echo "  cargo make release      - Create a release build"
echo "  cargo make dist         - Create distribution packages"
'''

# Install all dependencies
[tasks.install]
description = "Install all development dependencies"
script = '''
echo "Installing pre-commit..."
pip install --user pre-commit
pre-commit install
pre-commit install --hook-type commit-msg

echo "Installing cargo extensions..."
cargo install cargo-audit || true
cargo install cargo-deny || true
cargo install cargo-outdated || true
cargo install cargo-machete || true
cargo install cargo-tarpaulin || true
cargo install cargo-make || true
'''

# Complete development setup
[tasks.setup]
description = "Complete development environment setup"
dependencies = ["install"]
script = '''
echo "Setting up git hooks..."
pre-commit install --install-hooks

echo "Creating secrets baseline..."
detect-secrets scan > .secrets.baseline || true

echo "Running initial checks..."
pre-commit run --all-files || true

echo "Development environment ready!"
'''

# Run all checks using pre-commit
[tasks.check]
description = "Run all quality checks"
command = "pre-commit"
args = ["run", "--all-files"]

# Auto-fix issues
[tasks.fix]
description = "Auto-fix code issues"
script = '''
cargo fmt --all
cd tools && cargo fmt --all
cargo fix --allow-dirty --allow-staged
cd tools && cargo fix --allow-dirty --allow-staged
pre-commit run --all-files markdownlint || true
pre-commit run --all-files prettier || true
'''

# Format check
[tasks.format]
description = "Check code formatting"
command = "pre-commit"
args = ["run", "rust-fmt", "--all-files"]

# Lint check
[tasks.lint]
description = "Run clippy linting"
command = "pre-commit"
args = ["run", "rust-clippy", "--all-files"]

# Run tests
[tasks.test]
description = "Run all tests"
command = "pre-commit"
args = ["run", "rust-test", "--all-files"]

# Security checks
[tasks.security]
description = "Run security checks"
script = '''
pre-commit run rust-audit --all-files
pre-commit run rust-deny --all-files
pre-commit run detect-secrets --all-files
'''

# Build all
[tasks.build]
description = "Build all binaries"
script = '''
echo "Building game..."
cargo build --release

echo "Building tools..."
cd tools && cargo build --release --all-features
'''

# Run AI generator
[tasks.run]
description = "Run the AI generator"
cwd = "tools"
command = "cargo"
args = ["run", "--release", "--bin", "ai-gen"]

# Run studio
[tasks.studio]
description = "Run the Bevy studio"
cwd = "tools"
command = "cargo"
args = ["run", "--release", "--bin", "studio", "--features", "studio"]

# Build documentation
[tasks.docs]
description = "Build and open documentation"
script = '''
cargo doc --no-deps --open
cd tools && cargo doc --no-deps --all-features
'''

# Clean
[tasks.clean]
description = "Clean build artifacts"
script = '''
cargo clean
cd tools && cargo clean
rm -f .secrets.baseline
'''

# Release build
[tasks.release]
description = "Create optimized release builds"
script = '''
echo "Creating release builds..."
cargo build --release
cd tools && cargo build --release --all-features
'''

# Distribution packages
[tasks.dist]
description = "Create distribution packages"
dependencies = ["release"]
script = '''
mkdir -p dist

# Package the game
if [ -f "target/release/echoes-of-beastlight" ]; then
    tar -czf dist/echoes-of-beastlight-linux-x64.tar.gz -C target/release echoes-of-beastlight
fi

# Package the tools
cd tools/target/release
tar -czf ../../../dist/ai-game-generator-linux-x64.tar.gz ai-gen
cd ../../..

echo "Distribution packages created in dist/"
'''

# CI simulation
[tasks.ci]
description = "Simulate CI pipeline locally"
dependencies = ["check", "test", "security"]

# Quick pre-commit check
[tasks.precommit]
description = "Quick checks before committing"
dependencies = ["format", "lint"]

# Update all tools
[tasks.update-tools]
description = "Update all development tools"
script = '''
rustup update
cargo install --locked cargo-audit
cargo install --locked cargo-deny
cargo install --locked cargo-outdated
cargo install --locked cargo-machete
cargo install --locked cargo-tarpaulin
cargo install --locked cargo-make
pre-commit autoupdate
'''

# Workspace tasks
[tasks.workspace-check]
description = "Run checks on entire workspace"
workspace = true
command = "cargo"
args = ["check", "--all-features"]

[tasks.workspace-test]
description = "Run tests on entire workspace"
workspace = true
command = "cargo"
args = ["test", "--all-features"]